<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roleta de Brownies</title>
<!-- API -->
<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<!-- css -->
<link href="./style/style.css" type="text/css" rel="stylesheet">
<!-- js -->
<script src="./js/script.js"></script>
<script src="./js/music.js"></script>


</head> 
<body>
<div class="page-wrapper">

  <div class="wheel-section">
    <div class="wheel-container">
      <div class="wheel-pointer">
        <img src="./images/seta.svg" alt="Ponteiro da Roleta">
      </div>
      <img id="wheel" class="wheel-img" src="./images/Roleta.svg" alt="Roleta" onclick="spinWheel()" />
    </div>
  </div>

</div>

<div class="overlay" id="overlay">
  <div class="popup">
    <h2>🎉 Parabéns!</h2>
    <p style="color:#f5e6c8;font-family:'Nunito',sans-serif;font-weight:700;margin-bottom:4px;">Você ganhou:</p>
    <div class="prize-label" id="prizeText"></div>
    <button class="close-btn" onclick="document.location.reload()">Ótimo! 🍫</button>
  </div>
</div>
</body>
</html>
